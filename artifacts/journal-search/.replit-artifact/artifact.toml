kind = "web"
previewPath = "/"
title = "Open Access Journal Search"
version = "1.0.0"
id = "artifacts/journal-search"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18803

[services.development]
run = "pnpm --filter @workspace/journal-search run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/journal-search", "run", "build" ]
publicDir = "artifacts/journal-search/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18803"
BASE_PATH = "/"
